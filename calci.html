<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="src/output.css">
    <title>Document</title>
</head>
<body class="flex justify-center items-center min-h-screen bg-gradient-to-br from-gray-900 to-gray-700">
    <div class="body pb-[20px] shadow-[0_20px_50px_rgba(0,0,0,0.4)] w-[350px] h-[460px] flex flex-col items-center gap-[20px] mx-auto pt-[20px] rounded-xl bg-gray-600 border border-gray-400">
       <input class="w-[80%] h-[70px] bg-gray-800 text-white text-right px-4 rounded-lg text-4xl font-bold" placeholder="0" id="display" type="text" readonly>
    
    <div  class="buttons a w-[80%] grid grid-cols-4 gap-[10px] justify-center">
        <button class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">7</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">8</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">9</button>
    <button class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">+</button>

    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">4</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">5</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">6</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">-</button>
    
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">1</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">2</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">3</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">*</button>

    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">0</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">.</button>
    <button   class="h-[60px] text-2xl  bg-white rounded-[5px] font-black">%</button>
    <button id="res" class="px-[20px]  cursor-pointer bg-orange-600 active:bg-orange-700 hover:bg-orange-500 list-none  py-[5px] text-[30px] font-black text-black rounded-[3px]">=</button>
</div>
<div class="a w-[80%] flex justify-center">
    <button id="c" class="w-full bg-red-500 hover:bg-red-600 active:scale-105 active:bg-red-500 text-white h-[60px] rounded-lg text-2xl font-bold">C</button> 
</div>
</div>
<script src="ak.js"></script>
</body>
</html>
